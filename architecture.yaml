AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Commie - Parliamentary Motion Management System
  Deploys a frontend EC2 server, a backend EC2 server, and DynamoDB tables on AWS.

# ==============================================================================
# PARAMETERS
# ==============================================================================
Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair for SSH access to both instances

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type for the frontend and backend servers

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
    Description: Deployment environment tag applied to all resources

  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet

  LatestAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: Latest Amazon Linux 2023 AMI (resolved automatically per region)

  ArtifactsBucketName:
    Type: String
    Description: >
      Name of an EXISTING S3 bucket containing the deployment artifacts.
      Create this bucket manually, upload frontend/app.zip and backend/app.zip
      to it, then launch this stack. The bucket must be in the same region.

  FrontendZipKey:
    Type: String
    Default: frontend/frontend-app.zip
    Description: >
      S3 key of the frontend build artifact (pre-built Vite dist/ directory,
      zipped so that index.html sits at the root of the archive).

  BackendZipKey:
    Type: String
    Default: backend/backend-app.zip
    Description: >
      S3 key of the backend artifact (full Express project directory, zipped
      so that server.js sits at the root of the archive).

  InstanceProfileName:
    Type: String
    Default: LabInstanceProfile
    Description: >
      Name of the existing IAM instance profile to attach to both EC2 instances.
      In AWS Academy, use "LabInstanceProfile". In a regular AWS account you would
      create your own role — but Academy does not allow IAM resource creation.

  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: >
      Secret key used by the backend to sign JWT tokens.
      Must be at least 32 characters. Use a random string — never reuse passwords.

# ==============================================================================
# RESOURCES
# ==============================================================================
Resources:

  # ----------------------------------------------------------------------------
  # NETWORKING
  # ----------------------------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-subnet'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ----------------------------------------------------------------------------
  # SECURITY GROUPS
  # ----------------------------------------------------------------------------

  # Frontend: open HTTP/HTTPS to the world; SSH for administration
  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-frontend-sg'
      GroupDescription: Allow HTTP, HTTPS, and SSH to the frontend server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH - restrict to a known IP range in production
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-frontend-sg'

  # Backend: API port accessible only from the frontend server; SSH for administration
  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-backend-sg'
      GroupDescription: Allow API traffic from frontend and SSH for administration
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref FrontendSecurityGroup
          Description: Express API access from the frontend server only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH - restrict to a known IP range in production
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-backend-sg'

  # ----------------------------------------------------------------------------
  # EC2 INSTANCES
  # ----------------------------------------------------------------------------

  # Runs the Express.js API on port 3001. Must be created first so CloudFormation
  # can resolve BackendInstance.PrivateIp for the frontend nginx config.
  BackendInstance:
    Type: AWS::EC2::Instance
    # CloudFormation waits up to 10 minutes for cfn-signal before marking CREATE_COMPLETE.
    # This ensures the stack only succeeds when the backend is actually running.
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAMI
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BackendSecurityGroup
      IamInstanceProfile: !Ref InstanceProfileName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-backend'
        - Key: Role
          Value: backend
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Install cfn-bootstrap so we can signal CloudFormation when done
          dnf install -y aws-cfn-bootstrap

          # Helper: signal CloudFormation with success or failure and exit
          cfn_signal() {
            /opt/aws/bin/cfn-signal -e "$1" \
              --stack  ${AWS::StackName} \
              --region ${AWS::Region} \
              --resource BackendInstance
          }
          trap 'cfn_signal 1' ERR

          # ---- Install Node.js 20 via the official NodeSource stream ----
          dnf install -y nodejs npm unzip

          # Verify Node version
          node --version

          # ---- Install PM2 for process management ----
          npm install -g pm2

          # ---- Pull the backend artifact from S3 ----
          # aws CLI is pre-installed on Amazon Linux 2023
          mkdir -p /opt/commie
          aws s3 cp s3://${ArtifactsBucketName}/${BackendZipKey} /tmp/backend.zip
          unzip -o /tmp/backend.zip -d /opt/commie

          # ---- Write runtime environment variables ----
          # Static values — single-quoted heredoc, no bash/CF substitution
          cat > /opt/commie/.env << 'ENVFILE'
          NODE_ENV=production
          PORT=3001
          JWT_EXPIRES_IN=7d
          ENVFILE

          # CloudFormation-resolved values — unquoted heredoc
          cat >> /opt/commie/.env << ENVVARS
          JWT_SECRET=${JwtSecret}
          AWS_REGION=${AWS::Region}
          DYNAMODB_USERS_TABLE=${AWS::StackName}-users
          DYNAMODB_ORGANIZATIONS_TABLE=${AWS::StackName}-organizations
          DYNAMODB_COMMITTEES_TABLE=${AWS::StackName}-committees
          DYNAMODB_MOTIONS_TABLE=${AWS::StackName}-motions
          DYNAMODB_VOTES_TABLE=${AWS::StackName}-votes
          DYNAMODB_COMMENTS_TABLE=${AWS::StackName}-comments
          DYNAMODB_NOTIFICATIONS_TABLE=${AWS::StackName}-notifications
          ENVVARS

          # ---- Install dependencies and start the server ----
          cd /opt/commie
          npm install --omit=dev

          pm2 start server.js --name commie-backend
          # Register PM2 as a systemd service so it survives reboots.
          # When running as root, pm2 startup configures the service directly.
          pm2 startup systemd -u root --hp /root
          pm2 save

          # ---- Signal success ----
          cfn_signal 0

  # Serves the pre-built React/Vite SPA via nginx.
  # DependsOn BackendInstance so CloudFormation can resolve its private IP
  # before this instance's UserData is rendered by !Sub.
  FrontendInstance:
    Type: AWS::EC2::Instance
    DependsOn: BackendInstance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAMI
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref FrontendSecurityGroup
      IamInstanceProfile: !Ref InstanceProfileName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-frontend'
        - Key: Role
          Value: frontend
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Install cfn-bootstrap
          dnf install -y aws-cfn-bootstrap

          cfn_signal() {
            /opt/aws/bin/cfn-signal -e "$1" \
              --stack  ${AWS::StackName} \
              --region ${AWS::Region} \
              --resource FrontendInstance
          }
          trap 'cfn_signal 1' ERR

          # ---- Install nginx ----
          dnf install -y nginx unzip

          # ---- Pull the pre-built frontend artifact from S3 ----
          mkdir -p /var/www/commie
          aws s3 cp s3://${ArtifactsBucketName}/${FrontendZipKey} /tmp/frontend.zip
          unzip -o /tmp/frontend.zip -d /var/www/commie

          # ---- Write nginx config ----
          # Nginx variables use ${!var} syntax — the ! tells CloudFormation !Sub
          # to leave them alone, so nginx sees them as its own $var references.
          cat > /etc/nginx/conf.d/commie.conf << 'NGINXCONF'
          server {
              listen 80;
              server_name _;
              root /var/www/commie;
              index index.html;

              # React SPA — fall back to index.html for client-side routes
              location / {
                  try_files ${!uri} ${!uri}/ /index.html;
              }

              # Proxy API calls to the backend Express server
              location /api/ {
                  proxy_pass http://BACKEND_PRIVATE_IP:3001/;
                  proxy_http_version 1.1;
                  proxy_set_header Host ${!host};
                  proxy_set_header X-Real-IP ${!remote_addr};
                  proxy_set_header X-Forwarded-For ${!proxy_add_x_forwarded_for};
                  proxy_read_timeout 60s;
              }
          }
          NGINXCONF

          # Substitute the backend's private IP (resolved by CloudFormation at deploy time)
          sed -i 's/BACKEND_PRIVATE_IP/${BackendInstance.PrivateIp}/g' \
              /etc/nginx/conf.d/commie.conf

          # Remove the default server block so our config takes precedence
          rm -f /etc/nginx/conf.d/default.conf

          systemctl enable nginx
          systemctl start nginx

          # Verify nginx started cleanly before signaling success
          systemctl is-active --quiet nginx

          # ---- Signal success ----
          cfn_signal 0

  # ----------------------------------------------------------------------------
  # DYNAMODB TABLES
  #
  # Key-design notes:
  #   - PAY_PER_REQUEST (on-demand) billing — no capacity planning needed.
  #   - DeletionPolicy: Retain — dropping the stack does NOT delete table data.
  #     To fully clean up, delete tables manually after stack deletion.
  #   - VotesTable composite key (motionId HASH + userId RANGE) enforces
  #     one-vote-per-user-per-motion natively.
  # ----------------------------------------------------------------------------

  # PK: userId
  # GSI: email-index (login lookup without Scan)
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: organizationId
  # GSI: slug-index (URL lookup), inviteCode-index (join flow)
  OrganizationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-organizations'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
        - AttributeName: inviteCode
          AttributeType: S
      KeySchema:
        - AttributeName: organizationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: slug-index
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: inviteCode-index
          KeySchema:
            - AttributeName: inviteCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: committeeId
  # GSI: organizationId-index (list all committees in an org)
  #      slug-index (URL lookup — eliminates full-table Scan in auth middleware)
  CommitteesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-committees'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: committeeId
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: committeeId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: organizationId-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: slug-index
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: motionId
  # GSI: committeeId-index (list all motions in a committee)
  MotionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-motions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: motionId
          AttributeType: S
        - AttributeName: committeeId
          AttributeType: S
      KeySchema:
        - AttributeName: motionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: committeeId-index
          KeySchema:
            - AttributeName: committeeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: motionId (HASH) + userId (RANGE)
  # Composite key enforces one vote per user per motion at the DB level.
  # GSI: userId-index (query all votes cast by a user, e.g. for delete cascade)
  VotesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-votes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: motionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: motionId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: commentId
  # GSI: motionId-index (list all comments on a motion)
  CommentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-comments'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: commentId
          AttributeType: S
        - AttributeName: motionId
          AttributeType: S
      KeySchema:
        - AttributeName: commentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: motionId-index
          KeySchema:
            - AttributeName: motionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # PK: notificationId
  # GSI: userId-index (list notifications by recipient)
  #      committeeId-index (list notifications for a committee — used in notifications.js GET)
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-notifications'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: committeeId
          AttributeType: S
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: committeeId-index
          KeySchema:
            - AttributeName: committeeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

# ==============================================================================
# OUTPUTS
# ==============================================================================
Outputs:

  ArtifactsBucketName:
    Description: >
      S3 bucket for deployment artifacts. Upload frontend/app.zip and
      backend/app.zip here before launching (or re-launching) the stack.
    Value: !Ref ArtifactsBucketName
    Export:
      Name: !Sub '${AWS::StackName}-artifacts-bucket'

  FrontendURL:
    Description: Public URL of the frontend (open this in a browser)
    Value: !Sub 'http://${FrontendInstance.PublicDnsName}'
    Export:
      Name: !Sub '${AWS::StackName}-frontend-url'

  FrontendPublicIP:
    Description: Public IP address of the frontend EC2 instance
    Value: !GetAtt FrontendInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-frontend-ip'

  BackendPublicIP:
    Description: Public IP address of the backend EC2 instance
    Value: !GetAtt BackendInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-backend-ip'

  UsersTableName:
    Description: DynamoDB Users table name
    Value: !Ref UsersTable

  OrganizationsTableName:
    Description: DynamoDB Organizations table name
    Value: !Ref OrganizationsTable

  CommitteesTableName:
    Description: DynamoDB Committees table name
    Value: !Ref CommitteesTable

  MotionsTableName:
    Description: DynamoDB Motions table name
    Value: !Ref MotionsTable

  VotesTableName:
    Description: DynamoDB Votes table name
    Value: !Ref VotesTable

  CommentsTableName:
    Description: DynamoDB Comments table name
    Value: !Ref CommentsTable

  NotificationsTableName:
    Description: DynamoDB Notifications table name
    Value: !Ref NotificationsTable
